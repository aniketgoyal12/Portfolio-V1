<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family: Arial, Helvetica, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4; padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden; border:1px solid #e0e0e0;">
          <tr>
            <td style="background-color:#1a1a1a; padding:20px 32px;">
              <span style="color:#D4A017; font-size:12px; letter-spacing:2px; text-transform:uppercase; font-weight:bold;">Aniket Goyal</span>
              <h1 style="color:#ffffff; font-size:20px; margin:8px 0 0;">Message Received</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;">
              <p style="color:#333333; font-size:15px; line-height:1.6; margin:0 0 16px;">
                Hi {{sender_name}},
              </p>
              <p style="color:#333333; font-size:15px; line-height:1.6; margin:0 0 16px;">
                Thanks for reaching out through my portfolio. I've received your message and will get back to you as soon as possible.
              </p>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f9f9f9; border-left:3px solid #D4A017; border-radius:0 4px 4px 0; margin:0 0 24px;">
                <tr>
                  <td style="padding:16px;">
                    <p style="color:#888888; font-size:11px; margin:0 0 6px; text-transform:uppercase; letter-spacing:1px;">Your message</p>
                    <p style="color:#333333; font-size:14px; line-height:1.6; margin:0; white-space:pre-wrap;">{{message}}</p>
                  </td>
                </tr>
              </table>
              <p style="color:#333333; font-size:15px; line-height:1.6; margin:0;">
                Talk soon,<br>
                <strong>Aniket Goyal</strong>
              </p>
            </td>
          </tr>
          <tr>
            <td style="background-color:#fafafa; padding:16px 32px; border-top:1px solid #eeeeee;">
              <p style="color:#aaaaaa; font-size:11px; margin:0;">This is an automated confirmation — no need to reply to this email.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
